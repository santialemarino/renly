name: CI API

run-name: 'CI API by @${{ github.actor }}'

on:
  workflow_call:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/api/**'
  workflow_dispatch:

jobs:
  ci-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --no-install-project --extra dev

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Verify app imports
        env:
          # Dummy values — pydantic-settings requires these fields to be present at import time.
          # No DB connection or JWT signing happens during this step.
          DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/renly
          JWT_SECRET: ci-secret
        run: uv run python -c "from app.main import app"

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/renly
          JWT_SECRET: ci-secret
        run: uv run pytest tests/ -v
